<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hydra IPTV Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0f1a;
    --bg2: #0f1726;
    --bg3: #162033;
    --accent: #e53e3e;
    --accent2: #1a6cf0;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #eef2f8;
    --text2: #8fa0be;
    --border: #1e2d45;
    --card: #0d1525;
  }
  body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #0a0a2e 0%, #0d1b6e 40%, #1a0a3e 100%);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding: 20px 24px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  
  }
  .logo { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .logo-text { font-size: 22px; font-weight: 700; color: white; letter-spacing: 1px; text-shadow: 0 0 20px rgba(100,150,255,0.5); }

  .stats-bar { display: flex; gap: 8px; }
  .stat-pill { background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 13px; display: flex; align-items: center; gap: 6px; transition: all 0.2s; }
  .stat-pill:hover { border-color: var(--accent); }
  .pill-active { background: var(--accent) !important; border-color: var(--accent) !important; color: white !important; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-green { background: var(--green); }
  .dot-red { background: var(--red); }
  .dot-yellow { background: var(--yellow); }

  .toolbar {
    padding: 16px 24px;
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    background: var(--bg2); border-bottom: 1px solid var(--border);
  }
  .search-box { flex: 1; min-width: 200px; position: relative; }
  .search-box input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); border-radius: 10px; padding: 10px 16px 10px 40px;
    font-family: 'Cairo', sans-serif; font-size: 14px;
    outline: none; transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text2); font-size: 16px; }
  select {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    border-radius: 10px; padding: 10px 14px; font-family: 'Cairo', sans-serif;
    font-size: 14px; outline: none; cursor: pointer;
  }
  .btn {
    border: none; border-radius: 10px; padding: 10px 18px; cursor: pointer;
    font-family: 'Cairo', sans-serif; font-size: 14px; font-weight: 600;
    transition: all 0.2s; display: flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-danger { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
  .btn-danger:hover { background: rgba(239,68,68,0.25); }

  main { padding: 20px 24px; }

  .section-title {
    font-size: 16px; font-weight: 700; color: var(--text2);
    text-transform: uppercase; letter-spacing: 1px;
    margin: 20px 0 12px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .section-badge { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 2px 10px; font-size: 12px; color: var(--text2); }

  table { width: 100%; border-collapse: collapse; }
  .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 24px; }
  th {
    background: var(--bg3); padding: 12px 16px; text-align: center;
    font-size: 13px; font-weight: 600; color: var(--text2);
    border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid var(--border); vertical-align: middle; text-align: center; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(79,142,247,0.04); }

  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 600; white-space: nowrap;
  }
  .badge-green { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
  .badge-red { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
  .badge-yellow { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
  .badge-blue { background: rgba(79,142,247,0.15); color: #60a5fa; border: 1px solid rgba(79,142,247,0.3); }
  .badge-purple { background: rgba(124,92,252,0.15); color: #a78bfa; border: 1px solid rgba(124,92,252,0.3); }

  .mono { font-family: 'Courier New', monospace; font-size: 12px; color: var(--accent); background: rgba(79,142,247,0.08); padding: 2px 8px; border-radius: 6px; }

  .copy-btn { background: none; border: 1px solid var(--border); color: var(--text2); border-radius: 6px; padding: 3px 8px; cursor: pointer; font-size: 11px; transition: all 0.2s; }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

  .days-left { font-size: 12px; color: var(--text2); margin-top: 2px; }

  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; }
  .modal-bg.active { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 18px; padding: 28px; width: 480px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
  .modal h2 { font-size: 18px; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; }
  .form-group input, .form-group select {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); border-radius: 10px; padding: 10px 14px;
    font-family: 'Cairo', sans-serif; font-size: 14px; outline: none;
  }
  .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text2); border-radius: 10px; padding: 10px 18px; cursor: pointer; font-family: 'Cairo', sans-serif; font-size: 14px; }
  .btn-outline:hover { border-color: var(--text); color: var(--text); }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--bg3); border: 1px solid var(--green); color: var(--green); padding: 10px 20px; border-radius: 10px; font-size: 14px; z-index: 300; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }


  .name-suggestion {
    padding: 10px 16px; cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: space-between;
    transition: background 0.15s; border-bottom: 1px solid var(--border);
  }
  .name-suggestion:last-child { border-bottom: none; }
  .name-suggestion:hover { background: rgba(79,142,247,0.12); }
  .name-suggestion .acct-count { font-size: 11px; color: var(--accent); background: rgba(79,142,247,0.12); border-radius: 10px; padding: 2px 8px; }
  .hidden { display: none !important; }

  @media (max-width: 768px) {
    header { flex-direction: column; gap: 10px; }
    .stats-bar { flex-wrap: wrap; }
    main { padding: 12px; }
    .form-row { grid-template-columns: 1fr; }
    th, td { padding: 8px 10px; font-size: 12px; }
    .mono { font-size: 11px; }
  }
</style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBxpwm4K9KTVFHV22PD_yxKhvSn5ThJ4sA",
      authDomain: "iptv-database-8e795.firebaseapp.com",
      projectId: "iptv-database-8e795",
      storageBucket: "iptv-database-8e795.firebasestorage.app",
      messagingSenderId: "865423484494",
      appId: "1:865423484494:web:434c3357606e7b1e69051f",
      measurementId: "G-FB8559F1ZZ"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const DATA_DOC = doc(db, "iptv", "accounts");

    // استبدال دالة save لترفع على Firebase
    window.saveToFirebase = async function(data) {
      try {
        await setDoc(DATA_DOC, { list: JSON.stringify(data) });
      } catch(e) {
        console.error("Firebase save error:", e);
        showToast("❌ خطأ في الحفظ على Firebase", true);
      }
    };

    // مراقبة التغييرات في real-time
    onSnapshot(DATA_DOC, (snapshot) => {
      if (snapshot.exists()) {
        const raw = snapshot.data().list;
        const remote = JSON.parse(raw);
        // إضافة duration لأي حساب مش عنده
        remote.forEach(a => {
          if (!a.duration) a.duration = '15';
          if (a.paid === 'unpaid') a.paid = 'debt';
        });
        // حفظ التحديث على Firebase لو في تغيير
        const hasUnpaid = remote.some(a => a.paid === 'debt');
        // تحديث الداتا المحلية وإعادة الرسم
        if (JSON.stringify(accounts) !== JSON.stringify(remote)) {
          accounts = remote;
          localStorage.setItem(STORAGE_KEY, raw);
          renderAll();
        }
      } else {
        // أول مرة — ارفع الداتا الحالية على Firebase
        window.saveToFirebase(accounts);
      }
    });

    window._firebaseReady = true;
  </script>

let accounts = [];
let editingId = null;

function load() {
  // Firebase هو المصدر الأساسي — localStorage كـ fallback
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) { try { accounts = JSON.parse(saved); accounts.forEach(a => { if (!a.duration) a.duration = '15'; }); } catch(e) { accounts = [...DEFAULT_DATA]; } }
  else { accounts = [...DEFAULT_DATA]; save(); }
}

function save() {
  const data = JSON.stringify(accounts);
  localStorage.setItem(STORAGE_KEY, data);
  if (window.saveToFirebase) window.saveToFirebase(accounts);
}

function daysLeft(expDate) {
  if (!expDate) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const exp = new Date(expDate); exp.setHours(0,0,0,0);
  return Math.round((exp - today) / 86400000);
}

function statusOf(acc) {
  const d = daysLeft(acc.expDate);
  if (d === null) return 'unknown';
  if (d < 0) return 'expired';
  if (d <= 30) return 'expiring';
  return 'active';
}

function statusBadge(acc) {
  const d = daysLeft(acc.expDate);
  const s = statusOf(acc);
  if (s === 'expired') return `<span class="badge badge-red">⛔ منتهي</span>`;
  if (s === 'expiring') return `<span class="badge badge-yellow">⚠️ ${d} يوم</span>`;
  if (s === 'active') return `<span class="badge badge-green">✅ ${d} يوم</span>`;
  return `<span class="badge badge-blue">—</span>`;
}

function paidBadge(paid) {
  if (paid === 'paid') return `<span class="badge badge-green">مدفوع ✅</span>`;
  if (paid === 'debt') return `<span class="badge badge-yellow">دين للتاجر 🟡</span>`;
  return `<span class="badge badge-red">غير مدفوع ❌</span>`;
}

function formatDate(d) {
  if (!d) return '—';
  const parts = d.split('-');
  return `${parts[2]}/${parts[1]}/${parts[0]}`;
}

function copyBoth(user, pass, btn) {
  const text = `username: ${user}\npassword: ${pass}`;
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✅ تم النسخ';
    btn.style.borderColor = 'var(--green)';
    btn.style.color = 'var(--green)';
    setTimeout(() => { btn.textContent = orig; btn.style.borderColor = ''; btn.style.color = ''; }, 1500);
  });
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓';
    setTimeout(() => btn.textContent = '📋', 1000);
  });
}

    </div>

function setFilter(val) {
  if (val === 'unpaid') {
    document.getElementById('filterStatus').value = 'all';
    document.getElementById('filterPaid').value = 'unpaid';
  } else if (val === 'debt') {
    document.getElementById('filterStatus').value = 'all';
    document.getElementById('filterPaid').value = 'debt';
    setTimeout(() => { document.getElementById('tablesContainer').scrollIntoView({ behavior: 'smooth' }); }, 100);
  } else {
    document.getElementById('filterPaid').value = 'all';
    document.getElementById('filterStatus').value = val;
  }
  renderAll();
  window.scrollTo({ top: 200, behavior: 'smooth' });
}

function filtered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const fs = document.getElementById('filterStatus').value;
  const fp = document.getElementById('filterPaid').value;
  return accounts.filter(a => {
    const matchQ = !q || a.name.toLowerCase().includes(q) || a.username.toLowerCase().includes(q) || (a.phone||'').includes(q);
    const matchS = fs === 'all' || statusOf(a) === fs;
    const matchP = fp === 'all' || a.paid === fp || (fp === 'debt' && a.paid === 'unpaid');
    return matchQ && matchS && matchP;
  }).sort((a, b) => {
    const statusA = statusOf(a);
    const statusB = statusOf(b);
    // لو الاتنين "بتنتهي قريباً" رتب من الأقل أيام للأكثر
    if (statusA === 'expiring' && statusB === 'expiring') {
      return new Date(a.expDate) - new Date(b.expDate);
    }
    // لو الاتنين "منتهية" رتب من الأحدث انتهاءً للأقدم
    if (statusA === 'expired' && statusB === 'expired') {
      return new Date(b.expDate) - new Date(a.expDate);
    }
    // الأحدث startDate فوق للباقيين
    if (!a.startDate && !b.startDate) return 0;
    if (!a.startDate) return 1;
    if (!b.startDate) return -1;
    return new Date(b.startDate) - new Date(a.startDate);
  });
}

function renderAll() {
  renderStats();
  const data = filtered();
  const container = document.getElementById('tablesContainer');

  const groups = {
    expiring: { label: '⚠️ تنتهي خلال 30 يوم', items: [] },
    active:   { label: '✅ نشطة', items: [] },
    expired:  { label: '⛔ منتهية', items: [] },
  };

  data.forEach(a => {
    const s = statusOf(a);
    if (s === 'expiring') groups.expiring.items.push(a);
    else if (s === 'expired') groups.expired.items.push(a);
    else groups.active.items.push(a);
  });

  let html = '';

  ['expiring','active','expired'].forEach(key => {
    const g = groups[key];
    if (!g.items.length) return;
    html += `<div class="section-title">${g.label} <span class="section-badge">${g.items.length}</span></div>`;
    html += buildTable(g.items);
  });

  if (data.length === 0) html += `<div style="text-align:center;padding:60px;color:var(--text2)">🔍 لا توجد نتائج</div>`;
  container.innerHTML = html;
}



function buildTable(rows) {
  // Group by name
  const grouped = {};
  const order = [];
  rows.forEach(a => {
    const key = a.name;
    if (!grouped[key]) { grouped[key] = []; order.push(key); }
    grouped[key].push(a);
  });

  let t = `<div class="table-wrap"><table>
    <thead><tr>
      <th>الاسم</th><th>يوزرنيم / باسورد</th>
      <th>رقم التليفون</th><th>المدة</th><th>انتهاء الاشتراك</th>
      <th>الحالة</th><th>الدفع</th><th>ملاحظات</th><th>إجراء</th>
    </tr></thead><tbody>`;

  order.forEach(name => {
    const accs = grouped[name];
    const first = accs[0];
    const rowspan = accs.length;

    accs.forEach((a, i) => {
      const d = daysLeft(a.expDate);
      const rowStatus = statusOf(a);
      const rowBg = rowStatus === 'expiring' ? 'rgba(245,158,11,0.25)' : rowStatus === 'expired' ? 'rgba(239,68,68,0.25)' : rowStatus === 'active' ? 'rgba(34,197,94,0.2)' : '';
      const rowBorder = rowStatus === 'expiring' ? 'border-right:4px solid #f59e0b;border-left:4px solid #f59e0b' : rowStatus === 'expired' ? 'border-right:4px solid #ef4444;border-left:4px solid #ef4444' : rowStatus === 'active' ? 'border-right:4px solid #22c55e;border-left:4px solid #22c55e' : '';
      t += `<tr style="${i > 0 ? 'border-top:1px dashed rgba(255,255,255,0.1);' : ''}background:${rowBg};${rowBorder}">`; 

      // Name cell — only on first row, rowspan
      if (i === 0) {
        t += `<td rowspan="${rowspan}" style="vertical-align:top;padding-top:14px;border-left:3px solid ${rowspan > 1 ? 'var(--accent)' : 'transparent'}">
          <div style="font-weight:600;font-size:14px">${name}</div>
          ${rowspan > 1 ? `<div style="font-size:11px;color:var(--accent);margin-top:6px;background:rgba(79,142,247,0.1);padding:2px 8px;border-radius:10px;display:inline-block">${rowspan} أكونتات</div>` : ''}
        </td>`;
      }

      t += `
        <td>

function setPaid(id, value) {
  const acc = accounts.find(x => x.id === id);
  if (!acc) return;
  acc.paid = value;
  save(); renderAll();
  showToast(value === 'paid' ? '✅ تم التحويل لمدفوع' : '❌ تم التحويل لغير مدفوع');
}

function autoFillExpDate() {
  const startVal = document.getElementById('fDate').value;
  if (!startVal) { document.getElementById('fExp').value = ''; return; }
  const durEl = document.getElementById('fDuration');
  const months = durEl ? parseInt(durEl.value) || 15 : 15;
  const start = new Date(startVal);
  const exp = new Date(start);
  exp.setMonth(exp.getMonth() + months);
  const yyyy = exp.getFullYear();
  const mm = String(exp.getMonth() + 1).padStart(2, '0');
  const lastDay = new Date(yyyy, exp.getMonth() + 1, 0).getDate();
  const dd = String(Math.min(start.getDate(), lastDay)).padStart(2, '0');
  document.getElementById('fExp').value = `${yyyy}-${mm}-${dd}`;
}

function getUniqueNames() {
  const map = {};
  accounts.forEach(a => {
    if (!map[a.name]) map[a.name] = { count: 0, phone: '' };
    map[a.name].count++;
    if (a.phone) map[a.name].phone = a.phone;
  });
  return map;
}

function renderNameDropdown(filter) {
  const dd = document.getElementById('nameDropdown');
  const map = getUniqueNames();
  const names = Object.keys(map).filter(n => !filter || n.includes(filter));
  if (!names.length) { dd.style.display = 'none'; return; }
  dd.innerHTML = names.map(n =>
    `<div class="name-suggestion" onclick="selectName('${n.replace(/'/g,"\'")}')">
      <span>${n}</span>
      <span class="acct-count">${map[n].count} أكونت</span>
    </div>`
  ).join('');
  dd.style.display = 'block';
}

function toggleNameDropdown() {
  const dd = document.getElementById('nameDropdown');
  if (dd.style.display === 'block') { dd.style.display = 'none'; return; }
  renderNameDropdown('');
}

function selectName(name) {
  document.getElementById('fName').value = name;
  document.getElementById('nameDropdown').style.display = 'none';
  autoFillPhoneByName();
}

function autoFillPhoneByName() {
  const name = document.getElementById('fName').value.trim();
  if (!name) return;
  const match = accounts.find(x => x.name === name && x.phone);
  if (match) document.getElementById('fPhone').value = match.phone;
}

function openAddModal() {
  editingId = null;

function editAccount(id) {
  const a = accounts.find(x => x.id === id);
  if (!a) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = '✏️ تعديل الحساب';
  document.getElementById('fName').value = a.name || '';
  const phoneVal = a.phone || (accounts.find(x => x.name === a.name && x.phone) || {}).phone || '';
  document.getElementById('fPhone').value = phoneVal;
  document.getElementById('fUser').value = a.username || '';
  document.getElementById('fPass').value = a.password || '';
  // تعبئة الهوست - يختار المطابق من القائمة أو يضيف custom
  const hostEl = document.getElementById('fHost');
  const knownHosts = ['http://tvhydra.com','http://hydraa.st:80','http://hydratv.cc:80'];
  if (knownHosts.includes(a.host)) {
    hostEl.value = a.host;
  } else {
    hostEl.value = a.host || '';
  }
  document.getElementById('fDate').value = a.startDate || '';
  // حساب تاريخ الانتهاء تلقائياً من تاريخ الاشتراك
  if (a.startDate) {
    const s = new Date(a.startDate);
    const exp = new Date(s);
    exp.setMonth(exp.getMonth() + 15);
    const yyyy = exp.getFullYear();
    const mm = String(exp.getMonth() + 1).padStart(2, '0');
    const lastDay = new Date(yyyy, exp.getMonth() + 1, 0).getDate();
    const dd = String(Math.min(s.getDate(), lastDay)).padStart(2, '0');
    document.getElementById('fExp').value = `${yyyy}-${mm}-${dd}`;
  } else {
    document.getElementById('fExp').value = a.expDate || '';
  }
  document.getElementById('fPaid').value = a.paid || 'paid';
  document.getElementById('fNotes').value = a.notes || '';
  document.getElementById('fAmount').value = a.amount || '';
  const durEl2 = document.getElementById('fDuration'); if (durEl2) durEl2.value = a.duration || '15';
  document.getElementById('modalBg').classList.add('active');
}


let _pendingDupAccount = null;

function closeDupModal() {
  document.getElementById('dupModalBg').style.display = 'none';
  _pendingDupAccount = null;
}

function confirmDupSave() {
  closeDupModal();
  if (_pendingDupAccount) doSaveAccount(_pendingDupAccount);
}

function showDupModal(title, desc, accountData) {
  _pendingDupAccount = accountData;
  document.getElementById('dupModalTitle').textContent = title;
  document.getElementById('dupModalDesc').textContent = desc;
  document.getElementById('dupModalBg').style.display = 'flex';
}

function doSaveAccount(a, skipDupCheck) {
  // إعادة حساب تاريخ الانتهاء من تاريخ الاشتراك والمدة المختارة
  if (a.startDate) {
    const s = new Date(a.startDate);
    const months = parseInt(a.duration) || 15;
    const exp = new Date(s);
    exp.setMonth(exp.getMonth() + months);
    const yyyy = exp.getFullYear();
    const mm = String(exp.getMonth() + 1).padStart(2, '0');
    const lastDay = new Date(yyyy, exp.getMonth() + 1, 0).getDate();
    const dd = String(Math.min(s.getDate(), lastDay)).padStart(2, '0');
    a.expDate = `${yyyy}-${mm}-${dd}`;
  }
  if (editingId) {
    const idx = accounts.findIndex(x => x.id === editingId);
    if (idx !== -1) {
      const old = accounts[idx];
      const wasExpired = statusOf(old) === 'expired';
      const dateChanged = a.expDate && a.expDate !== old.expDate;
      if (wasExpired && dateChanged && !a.notes) a.notes = 'تجديد';
      accounts[idx] = { ...old, ...a };
    }
  } else {
    const maxId = accounts.reduce((m, x) => Math.max(m, x.id), 0);
    accounts.push({ id: maxId + 1, ...a });
  }
  const wasEditing = !!editingId;
  if (a.phone) accounts.forEach(x => { if (x.name === a.name) x.phone = a.phone; });
  save(); closeModal();
  document.getElementById('filterStatus').value = 'all';
  document.getElementById('filterPaid').value = 'all';
  document.getElementById('searchInput').value = '';
  renderAll();
  showToast(wasEditing ? '✅ تم التعديل — انتقل لقسمه الجديد' : '✅ تمت الإضافة');
}

function saveAccount() {
  const a = {
    name: document.getElementById('fName').value.trim(),
    phone: document.getElementById('fPhone').value.trim(),
    username: document.getElementById('fUser').value.trim(),
    password: document.getElementById('fPass').value.trim(),
    host: document.getElementById('fHost').value.trim(),
    startDate: document.getElementById('fDate').value,
    expDate: document.getElementById('fExp').value, // محسوب تلقائياً
    paid: document.getElementById('fPaid').value,
    amount: document.getElementById('fAmount').value,
    duration: document.getElementById('fDuration') ? document.getElementById('fDuration').value : '15',
    notes: document.getElementById('fNotes').value.trim(),
  };
  // التحقق من كل الحقول الإلزامية ماعدا الملاحظات
  const required = [
    { val: a.name,      label: 'اسم الحساب' },
    { val: a.username,  label: 'اليوزرنيم' },
    { val: a.password,  label: 'الباسورد' },
    { val: a.host,      label: 'الهوست' },
    { val: a.startDate, label: 'تاريخ الاشتراك' },
    { val: a.paid,      label: 'حالة الدفع' },
    { val: a.amount,    label: 'قيمة الاشتراك' },
    { val: a.duration,  label: 'مدة الاشتراك' },
  ];
  const missing = required.filter(r => !r.val);
  if (missing.length > 0) {
    showToast('❌ الحقول التالية مطلوبة: ' + missing.map(r => r.label).join('، '), true);
    return;
  }

  // فحص التكرار فقط عند الإضافة وليس التعديل
  if (!editingId) {
    const dupName = accounts.find(x => x.name === a.name);
    const dupPhone = a.phone && accounts.find(x => x.phone && x.phone === a.phone);

    if (dupName && dupPhone && dupName.name === dupPhone.name) {
      showDupModal(
        'الاسم ورقم الهاتف مكررَين!',
        `"${a.name}" موجود بالفعل عندك برقم ${a.phone}. هل تريد إضافة أكونت جديد لنفس الشخص؟`,
        a
      );
      return;
    } else if (dupName) {
      showDupModal(
        'الاسم مكرر!',
        `"${a.name}" موجود بالفعل عندك. هل تريد إضافة أكونت جديد لنفس الشخص؟`,
        a
      );
      return;
    } else if (dupPhone) {
      showDupModal(
        'رقم الهاتف مكرر!',
        `الرقم ${a.phone} مسجل بالفعل باسم "${dupPhone.name}". هل تريد المتابعة وإضافة الحساب؟`,
        a
      );
      return;
    }
  }

  doSaveAccount(a);
}
function deleteAccount(id) {
  if (!confirm('هل أنت متأكد من الحذف؟')) return;
  accounts = accounts.filter(x => x.id !== id);
  save(); renderAll();
  showToast('🗑️ تم الحذف');
}

  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

    <h2 style="color:white;font-size:20px;font-weight:700;margin:0 0 6px">Hydra IPTV Manager</h2>
    <p style="color:rgba(255,255,255,0.5);font-size:13px;margin:0 0 28px">يرجى تسجيل الدخول للمتابعة</p>

    <div style="text-align:right;margin-bottom:16px">
      <label style="color:rgba(255,255,255,0.7);font-size:13px;display:block;margin-bottom:6px">اسم المستخدم</label>
      <input id="loginUser" type="text" placeholder="أدخل اسم المستخدم"
        style="width:100%;background:rgba(255,255,255,0.9);border:none;border-radius:10px;padding:12px 16px;font-size:15px;font-family:Cairo,sans-serif;box-sizing:border-box;color:#333;text-align:right;">
    </div>

    <div style="text-align:right;margin-bottom:24px">
      <label style="color:rgba(255,255,255,0.7);font-size:13px;display:block;margin-bottom:6px">كلمة المرور</label>

        style="width:100%;background:rgba(255,255,255,0.9);border:none;border-radius:10px;padding:12px 16px;font-size:15px;font-family:Cairo,sans-serif;box-sizing:border-box;color:#333;text-align:right;"
        onkeydown="if(event.key==='Enter') doLogin()">
      <label style="display:flex;align-items:center;gap:8px;margin-top:8px;cursor:pointer;color:rgba(255,255,255,0.6);font-size:13px;user-select:none">
        <input type="checkbox" onchange="toggleLoginPass(this)" style="width:16px;height:16px;cursor:pointer;accent-color:#4f8ef7;">
        إظهار كلمة المرور
      </label>
    </div>

    <button onclick="doLogin()"
      style="width:100%;background:white;color:#0d2244;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:700;font-family:Cairo,sans-serif;cursor:pointer;margin-bottom:10px;">
      دخول ←
    </button>

    <button onclick="doGuestLogin()"
      style="width:100%;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.2);border-radius:10px;padding:12px;font-size:14px;font-weight:600;font-family:Cairo,sans-serif;cursor:pointer;margin-bottom:10px;">
      👁️ Guest Login
    </button>

    <div id="loginError" style="color:#ff6b6b;font-size:13px;margin-top:8px;display:none;">
      ❌ اسم المستخدم أو كلمة المرور غير صحيحة
    </div>
  </div>
</div>

<script>
window.isGuest = false;

function doLogout() {
  sessionStorage.removeItem('hydra_auth');
  window.isGuest = false;
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginError').style.display = 'none';
}

function toggleLoginPass(cb) {
  document.getElementById('loginPass').type = cb.checked ? 'text' : 'password';
}

function doLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value.trim();
  if (u === 'elattar89' && p === 'Rio@2211') {
    window.isGuest = false;
    document.getElementById('loginScreen').style.display = 'none';
    sessionStorage.setItem('hydra_auth', 'admin');
    setTimeout(applyGuestMode, 50);
  } else {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('loginPass').value = '';
    document.getElementById('loginPass').focus();
  }
}

function doGuestLogin() {
  window.isGuest = true;
  document.getElementById('loginScreen').style.display = 'none';
  sessionStorage.setItem('hydra_auth', 'guest');
  // إخفاء زرار الإضافة وتطبيق وضع القراءة
  applyGuestMode();
}

function applyGuestMode() {
  const addBtn = document.querySelector('button[onclick="openAddModal()"]');
  const filterBar = document.querySelector('.toolbar');
  if (window.isGuest) {
    if (addBtn) addBtn.style.display = 'none';
  } else {
    if (addBtn) addBtn.style.display = '';
  }
}

// لو سبق ودخل في نفس الجلسة
const _auth = sessionStorage.getItem('hydra_auth');
if (_auth === 'admin') {
  window.isGuest = false;
  document.getElementById('loginScreen').style.display = 'none';
} else if (_auth === 'guest') {
  window.isGuest = true;
  document.getElementById('loginScreen').style.display = 'none';
  setTimeout(applyGuestMode, 100);
}
</script>

</body>
</html>
