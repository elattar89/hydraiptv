<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0f1117;
    --bg2: #1a1d27;
    --bg3: #22263a;
    --accent: #4f8ef7;
    --accent2: #7c5cfc;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e8eaf0;
    --text2: #9aa0b8;
    --border: #2e3347;
    --card: #1e2235;

  body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: linear-gradient(135deg, #1a1d27 0%, #22263a 100%);

  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .logo-text { font-size: 20px; font-weight: 700; background: linear-gradient(90deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

  .stats-bar { display: flex; gap: 8px; }
  .stat-pill { background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; font-size: 13px; display: flex; align-items: center; gap: 6px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; }
  .dot-green { background: var(--green); }
  .dot-red { background: var(--red); }
  .dot-yellow { background: var(--yellow); }

  .toolbar {
    padding: 16px 24px;
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
    background: var(--bg2); border-bottom: 1px solid var(--border);
  }
  .search-box { flex: 1; min-width: 200px; position: relative; }
  .search-box input {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); border-radius: 10px; padding: 10px 16px 10px 40px;
    font-family: 'Cairo', sans-serif; font-size: 14px;
    outline: none; transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text2); font-size: 16px; }
  select {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    border-radius: 10px; padding: 10px 14px; font-family: 'Cairo', sans-serif;
    font-size: 14px; outline: none; cursor: pointer;
  }
  .btn {
    border: none; border-radius: 10px; padding: 10px 18px; cursor: pointer;
    font-family: 'Cairo', sans-serif; font-size: 14px; font-weight: 600;

  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-danger { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
  .btn-danger:hover { background: rgba(239,68,68,0.25); }

  main { padding: 20px 24px; }

  .section-title {
    font-size: 16px; font-weight: 700; color: var(--text2);
    text-transform: uppercase; letter-spacing: 1px;
    margin: 20px 0 12px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .section-badge { background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 2px 10px; font-size: 12px; color: var(--text2); }

  table { width: 100%; border-collapse: collapse; }
  .table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 24px; }
  th {
    background: var(--bg3); padding: 12px 16px; text-align: right;
    font-size: 13px; font-weight: 600; color: var(--text2);

  td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }

  .badge {

  .copy-btn { background: none; border: 1px solid var(--border); color: var(--text2); border-radius: 6px; padding: 3px 8px; cursor: pointer; font-size: 11px; transition: all 0.2s; }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

  .days-left { font-size: 12px; color: var(--text2); margin-top: 2px; }

  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; }
  .modal-bg.active { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 18px; padding: 28px; width: 480px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }

  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; }
  .form-group input, .form-group select {
    width: 100%; background: var(--bg3); border: 1px solid var(--border);
    color: var(--text); border-radius: 10px; padding: 10px 14px;

  .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text2); border-radius: 10px; padding: 10px 18px; cursor: pointer; font-family: 'Cairo', sans-serif; font-size: 14px; }

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const DATA_DOC = doc(db, "iptv", "accounts");

    // استبدال دالة save لترفع على Firebase
    window.saveToFirebase = async function(data) {
      try {
        await setDoc(DATA_DOC, { list: JSON.stringify(data) });
      } catch(e) {
        console.error("Firebase save error:", e);
        showToast("❌ خطأ في الحفظ على Firebase", true);
      }
    };

    // مراقبة التغييرات في real-time
    onSnapshot(DATA_DOC, (snapshot) => {
      if (snapshot.exists()) {
        const raw = snapshot.data().list;
        const remote = JSON.parse(raw);
        // تحديث الداتا المحلية وإعادة الرسم
        if (JSON.stringify(accounts) !== JSON.stringify(remote)) {
          accounts = remote;
          localStorage.setItem(STORAGE_KEY, raw);
          renderAll();
        }
      } else {
        // أول مرة — ارفع الداتا الحالية على Firebase
        window.saveToFirebase(accounts);
      }
    });

    window._firebaseReady = true;

let accounts = [];
let editingId = null;

function load() {
  // Firebase هو المصدر الأساسي — localStorage كـ fallback
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) { try { accounts = JSON.parse(saved); } catch(e) { accounts = [...DEFAULT_DATA]; } }
  else { accounts = [...DEFAULT_DATA]; save(); }
}

function save() {
  const data = JSON.stringify(accounts);
  localStorage.setItem(STORAGE_KEY, data);
  if (window.saveToFirebase) window.saveToFirebase(accounts);
}

function daysLeft(expDate) {
  if (!expDate) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const exp = new Date(expDate); exp.setHours(0,0,0,0);
  return Math.round((exp - today) / 86400000);
}

function statusOf(acc) {
  const d = daysLeft(acc.expDate);
  if (d === null) return 'unknown';
  if (d < 0) return 'expired';
  if (d <= 30) return 'expiring';
  return 'active';
}

function statusBadge(acc) {
  const d = daysLeft(acc.expDate);
  const s = statusOf(acc);
  if (s === 'expired') return `<span class="badge badge-red">⛔ منتهي</span>`;
  if (s === 'expiring') return `<span class="badge badge-yellow">⚠️ ${d} يوم</span>`;
  if (s === 'active') return `<span class="badge badge-green">✅ ${d} يوم</span>`;
  return `<span class="badge badge-blue">—</span>`;
}

function paidBadge(paid) {
  return paid === 'paid'
    ? `<span class="badge badge-green">مدفوع</span>`
    : `<span class="badge badge-red">غير مدفوع</span>`;
}

function formatDate(d) {
  if (!d) return '—';
  const parts = d.split('-');
  return `${parts[2]}/${parts[1]}/${parts[0]}`;
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓';
    setTimeout(() => btn.textContent = '📋', 1000);
  });
}

function renderStats() {
  const total = accounts.length;
  const active = accounts.filter(a => statusOf(a) === 'active').length;
  const expiring = accounts.filter(a => statusOf(a) === 'expiring').length;
  const expired = accounts.filter(a => statusOf(a) === 'expired').length;
  const unpaid = accounts.filter(a => a.paid === 'unpaid').length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-pill"><span class="dot dot-green"></span>${active} نشط</div>
    <div class="stat-pill"><span class="dot dot-yellow"></span>${expiring} ينتهي قريباً</div>
    <div class="stat-pill"><span class="dot dot-red"></span>${expired} منتهي</div>
    <div class="stat-pill">💰 ${unpaid} غير مدفوع</div>
    <div class="stat-pill">👥 ${total} إجمالي</div>
  `;
}

function filtered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const fs = document.getElementById('filterStatus').value;
  const fp = document.getElementById('filterPaid').value;
  return accounts.filter(a => {
    const matchQ = !q || a.name.toLowerCase().includes(q) || a.username.toLowerCase().includes(q) || (a.phone||'').includes(q);
    const matchS = fs === 'all' || statusOf(a) === fs;
    const matchP = fp === 'all' || a.paid === fp;
    return matchQ && matchS && matchP;
  });
}

function setFilter(status) {
  document.getElementById('filterStatus').value = status === 'unpaid' ? 'all' : status;
  document.getElementById('filterPaid').value = status === 'unpaid' ? 'unpaid' : 'all';
  renderAll();

function buildTable(rows) {
  // Group by name
  const grouped = {};
  const order = [];
  rows.forEach(a => {
    const key = a.name;
    if (!grouped[key]) { grouped[key] = []; order.push(key); }
    grouped[key].push(a);
  });

  let t = `<div class="table-wrap"><table>
    <thead><tr>
      <th>الاسم</th><th>يوزرنيم / باسورد</th>
      <th>رقم التليفون</th><th>انتهاء الاشتراك</th>
      <th>الحالة</th><th>الدفع</th><th>ملاحظات</th><th>إجراء</th>
    </tr></thead><tbody>`;

  order.forEach(name => {
    const accs = grouped[name];
    const first = accs[0];
    const rowspan = accs.length;

    accs.forEach((a, i) => {
      const d = daysLeft(a.expDate);
      t += `<tr style="${i > 0 ? 'border-top:1px dashed var(--border)' : ''}">`;

      // Name cell — only on first row, rowspan
      if (i === 0) {
        t += `<td rowspan="${rowspan}" style="vertical-align:top;padding-top:14px;border-left:3px solid ${rowspan > 1 ? 'var(--accent)' : 'transparent'}">
          <div style="font-weight:600;font-size:14px">${name}</div>
          ${rowspan > 1 ? `<div style="font-size:11px;color:var(--accent);margin-top:6px;background:rgba(79,142,247,0.1);padding:2px 8px;border-radius:10px;display:inline-block">${rowspan} أكونتات</div>` : ''}
        </td>`;
      }

      t += `
        <td>
          <span class="mono">${a.username}</span>
          <button class="copy-btn" onclick="copyText('${a.username}',this)">📋</button><br>
          <span class="mono" style="margin-top:4px;display:inline-block">${a.password}</span>
          <button class="copy-btn" onclick="copyText('${a.password}',this)">📋</button>
        </td>
        <td style="font-size:13px;color:var(--text);direction:ltr;text-align:right">${a.phone || '—'}</td>
        <td>
          <div>${formatDate(a.expDate)}</div>
          ${d !== null ? `<div class="days-left">${d < 0 ? `منذ ${Math.abs(d)} يوم` : `متبقي ${d} يوم`}</div>` : ''}
        </td>
        <td>${statusBadge(a)}</td>
        <td style="position:relative">
          <button onclick="showPaidMenu(event,${a.id})" style="background:none;border:none;cursor:pointer;padding:0">${paidBadge(a.paid)}</button>
        </td>
        <td style="font-size:12px;color:var(--text2)">${a.notes || '—'}</td>
        <td>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <button class="btn btn-primary" style="padding:6px 10px;font-size:12px" onclick="editAccount(${a.id})">✏️</button>
            <button class="btn btn-danger" style="padding:6px 10px;font-size:12px" onclick="deleteAccount(${a.id})">🗑️</button>
            <button onclick="showMsg(${a.id},'confirm')" style="background:rgba(79,142,247,0.15);border:1px solid rgba(79,142,247,0.4);color:#60a5fa;border-radius:8px;padding:5px 9px;font-size:11px;cursor:pointer;font-family:Cairo,sans-serif;white-space:nowrap">📨 تأكيد</button>
            <button onclick="showMsg(${a.id},'remind')" style="background:rgba(124,92,252,0.15);border:1px solid rgba(124,92,252,0.4);color:#a78bfa;border-radius:8px;padding:5px 9px;font-size:11px;cursor:pointer;font-family:Cairo,sans-serif;white-space:nowrap">🔔 تذكير</button>
          </div>
        </td>
      </tr>`;
    });

    // Separator between different people
    t += `<tr style="height:4px;background:var(--bg3)"><td colspan="8"></td></tr>`;
  });

  t += `</tbody></table></div>`;
  return t;
}

function setPaid(id, value) {

  showToast(value === 'paid' ? '✅ تم التحويل لمدفوع' : '❌ تم التحويل لغير مدفوع');
}

function autoFillExpDate() {
  const startVal = document.getElementById('fDate').value;
  if (!startVal) { document.getElementById('fExp').value = ''; return; }
  const start = new Date(startVal);
  const exp = new Date(start);
  exp.setMonth(exp.getMonth() + 15);
  const yyyy = exp.getFullYear();
  const mm = String(exp.getMonth() + 1).padStart(2, '0');
  // نحافظ على نفس اليوم أو آخر يوم في الشهر
  const lastDay = new Date(yyyy, exp.getMonth() + 1, 0).getDate();
  const dd = String(Math.min(start.getDate(), lastDay)).padStart(2, '0');
  document.getElementById('fExp').value = `${yyyy}-${mm}-${dd}`;
}

function getUniqueNames() {
  const map = {};
  accounts.forEach(a => {
    if (!map[a.name]) map[a.name] = { count: 0, phone: '' };
    map[a.name].count++;
    if (a.phone) map[a.name].phone = a.phone;
  });
  return map;
}

function renderNameDropdown(filter) {
  const dd = document.getElementById('nameDropdown');
  const map = getUniqueNames();
  const names = Object.keys(map).filter(n => !filter || n.includes(filter));
  if (!names.length) { dd.style.display = 'none'; return; }
  dd.innerHTML = names.map(n =>
    `<div class="name-suggestion" onclick="selectName('${n.replace(/'/g,"\'")}')">
      <span>${n}</span>
      <span class="acct-count">${map[n].count} أكونت</span>
    </div>`
  ).join('');
  dd.style.display = 'block';
}

function toggleNameDropdown() {
  const dd = document.getElementById('nameDropdown');
  if (dd.style.display === 'block') { dd.style.display = 'none'; return; }
  renderNameDropdown('');
}

function selectName(name) {
  document.getElementById('fName').value = name;
  document.getElementById('nameDropdown').style.display = 'none';
  autoFillPhoneByName();
}

function autoFillPhoneByName() {
  const name = document.getElementById('fName').value.trim();
  if (!name) return;
  const match = accounts.find(x => x.name === name && x.phone);
  if (match) document.getElementById('fPhone').value = match.phone;
}

function editAccount(id) {
  const a = accounts.find(x => x.id === id);
  if (!a) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = '✏️ تعديل الحساب';
  document.getElementById('fName').value = a.name || '';
  const phoneVal = a.phone || (accounts.find(x => x.name === a.name && x.phone) || {}).phone || '';
  document.getElementById('fPhone').value = phoneVal;
  document.getElementById('fUser').value = a.username || '';
  document.getElementById('fPass').value = a.password || '';
  document.getElementById('fHost').value = a.host || '';
  document.getElementById('fDate').value = a.startDate || '';
  // حساب تاريخ الانتهاء تلقائياً من تاريخ الاشتراك
  if (a.startDate) {
    const s = new Date(a.startDate);
    const exp = new Date(s);
    exp.setMonth(exp.getMonth() + 15);
    const yyyy = exp.getFullYear();
    const mm = String(exp.getMonth() + 1).padStart(2, '0');
    const lastDay = new Date(yyyy, exp.getMonth() + 1, 0).getDate();
    const dd = String(Math.min(s.getDate(), lastDay)).padStart(2, '0');
    document.getElementById('fExp').value = `${yyyy}-${mm}-${dd}`;
  } else {
    document.getElementById('fExp').value = a.expDate || '';
  }
  document.getElementById('fPaid').value = a.paid || 'paid';
  document.getElementById('fNotes').value = a.notes || '';
  document.getElementById('modalBg').classList.add('active');
}


let _pendingDupAccount = null;

function closeDupModal() {
  document.getElementById('dupModalBg').style.display = 'none';

function confirmDupSave() {
  closeDupModal();
  if (_pendingDupAccount) doSaveAccount(_pendingDupAccount);
}

function showDupModal(title, desc, accountData) {
  _pendingDupAccount = accountData;
  document.getElementById('dupModalTitle').textContent = title;
  document.getElementById('dupModalDesc').textContent = desc;
  document.getElementById('dupModalBg').style.display = 'flex';
}

function doSaveAccount(a, skipDupCheck) {
  // إعادة حساب تاريخ الانتهاء من تاريخ الاشتراك دايماً
  if (a.startDate) {
    const s = new Date(a.startDate);
    const exp = new Date(s);
    exp.setMonth(exp.getMonth() + 15);
    const yyyy = exp.getFullYear();
    const mm = String(exp.getMonth() + 1).padStart(2, '0');
    const lastDay = new Date(yyyy, exp.getMonth() + 1, 0).getDate();
    const dd = String(Math.min(s.getDate(), lastDay)).padStart(2, '0');
    a.expDate = `${yyyy}-${mm}-${dd}`;
  }
  if (editingId) {
    const idx = accounts.findIndex(x => x.id === editingId);
    if (idx !== -1) {
      const old = accounts[idx];
      const wasExpired = statusOf(old) === 'expired';
      const dateChanged = a.expDate && a.expDate !== old.expDate;
      if (wasExpired && dateChanged && !a.notes) a.notes = 'تجديد';
      accounts[idx] = { ...old, ...a };
    }
  } else {
    const maxId = accounts.reduce((m, x) => Math.max(m, x.id), 0);
    accounts.push({ id: maxId + 1, ...a });
  }
  const wasEditing = !!editingId;
  if (a.phone) accounts.forEach(x => { if (x.name === a.name) x.phone = a.phone; });
  save(); closeModal();
  document.getElementById('filterStatus').value = 'all';
  document.getElementById('filterPaid').value = 'all';
  document.getElementById('searchInput').value = '';
  renderAll();
  showToast(wasEditing ? '✅ تم التعديل — انتقل لقسمه الجديد' : '✅ تمت الإضافة');
}

function saveAccount() {
  const a = {
    name: document.getElementById('fName').value.trim(),
    phone: document.getElementById('fPhone').value.trim(),
    username: document.getElementById('fUser').value.trim(),
    password: document.getElementById('fPass').value.trim(),
    host: document.getElementById('fHost').value.trim(),
    startDate: document.getElementById('fDate').value,
    expDate: document.getElementById('fExp').value, // محسوب تلقائياً
    paid: document.getElementById('fPaid').value,
    notes: document.getElementById('fNotes').value.trim(),
  };
  if (!a.name || !a.username) { showToast('❌ الاسم واليوزرنيم مطلوبان', true); return; }

  // فحص التكرار فقط عند الإضافة وليس التعديل
  if (!editingId) {
    const dupName = accounts.find(x => x.name === a.name);
    const dupPhone = a.phone && accounts.find(x => x.phone && x.phone === a.phone);

    if (dupName && dupPhone && dupName.name === dupPhone.name) {
      showDupModal(
        'الاسم ورقم الهاتف مكررَين!',
        `"${a.name}" موجود بالفعل عندك برقم ${a.phone}. هل تريد إضافة أكونت جديد لنفس الشخص؟`,
        a
      );
      return;
    } else if (dupName) {
      showDupModal(
        'الاسم مكرر!',
        `"${a.name}" موجود بالفعل عندك. هل تريد إضافة أكونت جديد لنفس الشخص؟`,
        a
      );
      return;
    } else if (dupPhone) {
      showDupModal(
        'رقم الهاتف مكرر!',
        `الرقم ${a.phone} مسجل بالفعل باسم "${dupPhone.name}". هل تريد المتابعة وإضافة الحساب؟`,
        a
      );
      return;
    }
  }

  doSaveAccount(a);
}

function openWa() {
  if (!window._currentMsgPhone) return;
  window.open('https://wa.me/' + window._currentMsgPhone + '?text=' + encodeURIComponent(window._currentMsgText), '_blank');
}

function copyMsg() {
  const t = document.getElementById('msgText');
  navigator.clipboard.writeText(t.value).then(() => showToast('📋 تم نسخ الرسالة'));
}
</script>

<div class="modal-bg" id="msgModalBg">
  <div class="modal" style="max-width:560px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <h2 id="msgModalTitle" style="margin:0">📨 رسالة التأكيد</h2>
      <button onclick="document.getElementById('msgModalBg').classList.remove('active')" style="background:none;border:none;color:var(--text2);font-size:20px;cursor:pointer">✕</button>
    </div>
    <textarea id="msgText" readonly style="width:100%;height:320px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:14px;font-family:Cairo,sans-serif;font-size:13px;line-height:1.8;resize:none;outline:none;direction:ltr"></textarea>
    <div class="modal-actions" style="margin-top:14px">
      <button class="btn-outline" onclick="document.getElementById('msgModalBg').classList.remove('active')">إغلاق</button>
      <button class="btn btn-primary" onclick="copyMsg()">📋 نسخ الرسالة</button>
      <button id="waBtn" class="btn btn-primary" style="background:linear-gradient(135deg,#25d366,#128c7e);display:none" onclick="openWa()">💬 فتح واتساب</button>
    </div>
  </div>
</div>


<!-- Duplicate Warning Popup -->
<div id="dupModalBg" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:300;align-items:center;justify-content:center">
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:28px;width:420px;max-width:92vw;text-align:center">
    <div style="font-size:40px;margin-bottom:12px">⚠️</div>
    <h2 id="dupModalTitle" style="font-size:17px;margin-bottom:10px;color:var(--text)"></h2>
    <p id="dupModalDesc" style="font-size:13px;color:var(--text2);margin-bottom:22px;line-height:1.7"></p>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="btn-outline" onclick="closeDupModal()" style="border-radius:10px;padding:10px 20px;font-family:Cairo,sans-serif;font-size:14px;cursor:pointer">✕ إغلاق</button>
      <button class="btn btn-primary" id="dupConfirmBtn" onclick="confirmDupSave()">➕ إضافة على نفس الشخص</button>
    </div>
  </div>
</div>
</body>
</html>
